<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Home Inventory{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Top nav -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-lg font-bold text-gray-800 flex items-center gap-2">
        <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Inventory
      </a>
      <div class="flex items-center gap-3">
        <a href="/search" class="text-gray-500 hover:text-gray-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </a>
        <!-- Add dropdown -->
        <div class="relative" id="add-menu-wrapper">
          <button onclick="document.getElementById('add-menu').classList.toggle('hidden')"
            class="bg-indigo-600 text-white text-sm px-3 py-1.5 rounded-lg font-medium hover:bg-indigo-700 flex items-center gap-1">
            + New
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div id="add-menu" class="hidden absolute right-0 top-9 bg-white border border-gray-200 rounded-xl shadow-lg py-1 z-20 w-36">
            <a href="/inventory/new" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">🎸 Gear</a>
            <a href="/bin/new" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">📦 Bin</a>
          </div>
        </div>
        <a href="/inventory" class="text-gray-500 hover:text-gray-800 text-sm">Gear</a>
        <a href="/locations" class="text-gray-500 hover:text-gray-800 text-sm">Locations</a>
        <a href="/categories" class="text-gray-500 hover:text-gray-800 text-sm">Categories</a>
        <script>
          document.addEventListener('click', function(e) {
            var w = document.getElementById('add-menu-wrapper');
            if (w && !w.contains(e.target)) document.getElementById('add-menu').classList.add('hidden');
          });
        </script>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
