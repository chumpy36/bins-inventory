{% extends "base.html" %}
{% block title %}Categories — Bins{% endblock %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h1 class="text-xl font-bold text-gray-900">Categories</h1>
</div>

<!-- Existing categories -->
{% for cat in categories %}
<div class="bg-white rounded-2xl border border-gray-200 p-4 mb-3 flex items-center gap-3">
  <span class="w-5 h-5 rounded-full flex-shrink-0 border border-gray-200" style="background:{{ cat.color }}"></span>
  <div class="flex-1">
    <div class="font-medium text-gray-800">{{ cat.name }}</div>
    <div class="text-xs text-gray-400">{{ cat.bins | length }} bins</div>
  </div>
  <form method="post" action="/categories/{{ cat.id }}/delete"
    onsubmit="return confirm('Delete {{ cat.name }}? Bins will become uncategorized.')">
    <button type="submit" class="text-gray-300 hover:text-red-400 text-sm p-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </form>
</div>
{% else %}
<p class="text-gray-400 text-sm mb-4">No categories yet.</p>
{% endfor %}

<!-- Add new category -->
<div class="bg-white rounded-2xl border border-gray-200 p-5 mt-6">
  {% if error %}
  <div class="mb-4 px-4 py-2.5 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm">{{ error }}</div>
  {% endif %}
  <h2 class="font-semibold text-gray-700 mb-4">Add Category</h2>
  <form method="post" action="/categories" class="space-y-3">
    <div>
      <input type="text" name="name" required placeholder="Category name"
        class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base">
    </div>
    <div class="flex items-center gap-3">
      <label class="text-sm text-gray-600">Color</label>
      <input type="color" name="color" value="#6366f1"
        class="w-10 h-10 rounded-lg border border-gray-200 cursor-pointer p-0.5">
    </div>
    <button type="submit"
      class="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-medium hover:bg-indigo-700">
      Add Category
    </button>
  </form>
</div>

{% endblock %}
