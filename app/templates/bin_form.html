{% extends "base.html" %}
{% block title %}{% if bin %}Edit {{ bin.name }}{% else %}New Bin{% endif %} — Bins{% endblock %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <a href="/" class="text-gray-400 hover:text-gray-700">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <h1 class="text-xl font-bold text-gray-900">{% if bin %}Edit Bin{% else %}New Bin{% endif %}</h1>
</div>

<form method="post" action="{% if bin %}/bin/{{ bin.token }}/edit{% else %}/bin/new{% endif %}"
  class="bg-white rounded-2xl border border-gray-200 p-5 space-y-4">

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Bin Name</label>
    <input type="text" name="name" required value="{{ bin.name if bin else '' }}"
      placeholder="e.g. Christmas Lights"
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
    <select name="category_id"
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base bg-white">
      <option value="">— None —</option>
      {% for cat in categories %}
      <option value="{{ cat.id }}" {% if bin and bin.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Location <span class="text-gray-400 font-normal">(optional)</span></label>
    <input type="text" name="location" value="{{ bin.location or '' if bin else '' }}"
      placeholder="e.g. Shed shelf 2, Garage left wall"
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base">
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
    <textarea name="notes" rows="2" placeholder="Any extra notes..."
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-base resize-none">{{ bin.notes or '' if bin else '' }}</textarea>
  </div>

  <div class="flex gap-3 pt-2">
    <button type="submit"
      class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl font-medium hover:bg-indigo-700 text-base">
      {% if bin %}Save Changes{% else %}Create Bin{% endif %}
    </button>
    {% if bin %}
    <button type="button"
      hx-post="/bin/{{ bin.token }}/delete"
      hx-confirm="Delete {{ bin.name }} and all its contents?"
      class="px-4 py-2.5 rounded-xl border border-red-200 text-red-500 hover:bg-red-50 text-base">
      Delete
    </button>
    {% endif %}
  </div>

</form>

{% endblock %}
