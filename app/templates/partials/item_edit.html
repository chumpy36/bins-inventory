<form hx-post="/item/{{ item.id }}/edit"
      hx-target="#item-{{ item.id }}"
      hx-swap="innerHTML"
      class="flex items-center gap-2 px-4 py-2 border-b border-gray-50">
  <input type="text" name="name" value="{{ item.name }}" required
    class="flex-1 px-3 py-1.5 rounded-lg border border-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
  <input type="number" name="quantity" value="{{ item.quantity }}" min="1"
    class="w-14 px-2 py-1.5 rounded-lg border border-gray-200 text-center focus:outline-none focus:ring-1 focus:ring-indigo-300 text-sm">
  <button type="submit" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium px-1">Save</button>
  <button type="button"
    hx-get="/item/{{ item.id }}/cancel"
    hx-target="#item-{{ item.id }}"
    hx-swap="innerHTML"
    class="text-gray-400 hover:text-gray-600 text-sm px-1"
    onclick="htmx.ajax('GET', '/item/{{ item.id }}/view', {target: '#item-{{ item.id }}', swap: 'innerHTML'})">
    Cancel
  </button>
  <input type="hidden" name="notes" value="{{ item.notes or '' }}">
</form>
