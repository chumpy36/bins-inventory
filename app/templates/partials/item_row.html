<div class="flex items-center justify-between px-4 py-3 border-b border-gray-50 last:border-0">
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-2">
      {% if item.quantity > 1 %}
      <span class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded">×{{ item.quantity }}</span>
      {% endif %}
      <span class="text-gray-800 text-sm">{{ item.name }}</span>
    </div>
    {% if item.notes %}
    <div class="text-xs text-gray-400 mt-0.5 truncate">{{ item.notes }}</div>
    {% endif %}
  </div>
  <div class="flex items-center gap-2 ml-2">
    <button
      hx-get="/item/{{ item.id }}/edit"
      hx-target="#item-{{ item.id }}"
      hx-swap="innerHTML"
      class="text-gray-300 hover:text-indigo-500 p-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
    </button>
    <button
      hx-post="/item/{{ item.id }}/delete"
      hx-target="#item-{{ item.id }}"
      hx-swap="outerHTML"
      hx-confirm="Remove {{ item.name }}?"
      class="text-gray-300 hover:text-red-500 p-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>
