<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All QR Codes — Bin Inventory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: white; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 2.5in);
      gap: 0.15in;
      padding: 0.3in;
    }
    .label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0.1in;
      border: 1px solid #ddd;
      border-radius: 6px;
      page-break-inside: avoid;
    }
    .label img { width: 1.6in; height: 1.6in; }
    .bin-name { font-size: 9pt; font-weight: 700; text-align: center; line-height: 1.2; }
    .bin-meta { font-size: 7pt; color: #888; text-align: center; }
    .btn { display: inline-block; margin: 16px; padding: 10px 20px; background: #4f46e5; color: white;
           text-decoration: none; border-radius: 8px; font-family: -apple-system, sans-serif; cursor: pointer;
           border: none; font-size: 14px; }
    @media print { .btn { display: none; } }
  </style>
</head>
<body>
  <div style="text-align:center">
    <button class="btn" onclick="window.print()">🖨 Print All QR Codes</button>
  </div>
  <div class="grid">
    {% for item in items %}
    <div class="label">
      <img src="data:image/png;base64,{{ item.qr_b64 }}" alt="QR">
      <div class="bin-name">{{ item.bin.name }}</div>
      {% if item.bin.category %}
      <div class="bin-meta">{{ item.bin.category.name }}</div>
      {% endif %}
      {% if item.bin.location %}
      <div class="bin-meta">{{ item.bin.location }}</div>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</body>
</html>
