services:
  bins-app:
    image: bins-inventory:latest
    container_name: bins-inventory
    volumes:
      - /volume1/docker/bins-inventory/data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/bins.db
      - DATA_DIR=/app/data
      - PHOTOS_DIR=/app/data/photos
      - BASE_URL=https://inventory.hollandit.work
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: bins-inventory-tunnel
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - bins-app
    network_mode: "service:bins-app"
